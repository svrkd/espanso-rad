matches:
  - trigger: "mmg2"
    replace: |
      MAMOGRAFIA DIGITAL BILATERAL

      História: 
      - Exame periódico/Exame de rastreio/Mamografia de base.
      - Última mamografia disponível para comparação realizada em -----.
      - Sem exames prévios disponíveis para comparação.
      - Histórico de mamoplastia redutora em ---.
      - Implantes mamários bilaterais ao estudo mamográfico.
      - Material metálico marcador de lesão cutânea.

      Técnica:
      Exame realizado em aparelho de alta resolução nas incidências crânio-caudal e médio-lateral oblíqua.

      Achados:
      Mamas extremamente densas, limitando a sensibilidade do método em detec-tar nódulos.
      Mamas heterogeneamente densas, limitando a sensibilidade do método em detectar nódulos.
      As mamas apresentam densidades fibroglandulares difusas. 
      As mamas são predominantemente adiposas.  

      Nódulo ovalado, isodenso, circunscrito, localizado no quadrante superolateral da mama esquerda.

      Não se visibilizam nódulos e/ou microcalcificações patológicas agrupadas.   
      Calcificações puntiformes isoladas difusas por ambas as mamas. 
      Papilas e regiões retroareolares sem alterações evidentes.
      Tecido adiposo subcutâneo e espaço retromamário bem conservados.
      Pele e tecido celular subcutâneo sem alterações.
      Vasos mamários com distribuição e morfologia normais.

      Linfonodos de aspecto habitual em ambos os prolongamentos axilares.
      Linfonodos de aspecto habitual no prolongamento axilar direito/esquerdo.
      Prolongamentos axilares livres.
      Linfonodo intramamário à direita/esquerda.

      Opinião:
      -
      - Calcificações puntiformes isoladas difusas por ambas as mamas. 

      Classificação radiológica (BI-RADS): X Reajustado de acordo com estudo ecográfico do dia ---.

      Obs.:
      - Em relação ao exame anterior, não foram observadas alterações radiológicas significativas.
      - Conveniente controle com mamografia periódica no espaço de 01 (um) ano.
      - Conveniente controle com mamografia periódica no espaço de 06 (seis) me-ses.
      - A critério clínico, o estudo ecográfico poderá fornecer maiores subsídios diag-nósticos.
      - Conveniente estudo histopatológico. 
      - O exame ultrassonográfico complementar poderá fornecer maiores subsídios diagnósticos.

      NOTA: No retorno trazer exames anteriores para comparação com os controles futuros.

      "Os achados negativos na mamografia não significam ausência de malignida-de. Na presença de nódulo palpável ou outra anormalidade clínica importante, o achado negativo não exclui a necessidade de prosseguir a investigação".
    word: true
