  - trigger: "nascetnl"
    word: true
    replace: |
      TOMOGRAFIA COMPUTADORIZADA DE PESCOÇO C/C
      
      Técnica:
      Imagens obtidas por aquisição volumétrica "multislice" após a administração intravenosa do meio de contraste iodado.
      
      Análise:
      Tênue ateromatose é identificada nos bulbos carotídeos e segmentos proximais das artérias carótidas internas e externas.
      Artérias carótidas comuns, internas e externas com calibre preservado, sem estenoses significativas.
      Artérias vertebrais e basilar com calibre preservado, exibindo opacificação satisfatória pelo meio de contraste endovenoso.
      Tronco braquiocefálico e porções proximais das artérias subclávias com trajeto e calibre preservados.
      Origem habitual dos vasos no arco aórtico.
      Faringe apresentando coeficientes de atenuação preservados.
      Glândulas parótidas e submandibulares sem alterações.
      Epiglote, pregas ariepiglóticas, bandas ventriculares e cordas vocais apresentando coeficientes de atenuação preservados.
      Aumento do número de linfonodos cervicais, sem caracterizar linfonodomegalias.
      Alterações degenerativas da coluna cervical.
      
      Opinião:
      Tênue ateromatose é identificada nos bulbos carotídeos e segmentos proximais das artérias carótidas internas e externas.
      Aumento do número de linfonodos cervicais, sem caracterizar linfonodomegalias.
      Alterações degenerativas da coluna cervical.

