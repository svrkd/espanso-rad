      Acotovelamento ("kinking") da artéria carótida comum esquerda logo abaixo da entrada no forame carotídeo ipsilateral.
      Segmentos cervicais das artérias vertebrais de trajeto, calibre e contornos normais.
      
      Opinião:
      Artéria carótida comum esquerda se originando no tronco braquiocefálico (variante da normalidade, achado sem repercussão clínica significativa).
