    word: true
    replace: Formação hipodensa, mal delimitada, medindo cerca de _ x _ x _ cm, com discreto realce pelo meio de contraste endovenoso, localizada posteriormente no espaço da mucosa da faringe esquerdo, estendendo-se desde a altura da base da língua à laringe supraglótica, onde exerce efeito de massa promovendo redução do calibre da coluna aérea. Associa-se aumento do número de linfonodos cervicais à esquerda, sem caracterizar linfonodomegalias, bem como densificação de pele, tecido subcutâneo e planos mioadiposos adjacentes e espessamento do músculo platisma ipsilateral. Admite-se inicialmente a hipótese diagnóstica de processo inflamatório/infeccioso faringolaringeo com abscesso em organização. Os diagnósticos diferenciais devem ser aplicados, em estreita correlação com dados clínicos e laboratoriais, não sendo possível afastar de forma inequívoca a possibilidade de neoplasia.
     
  - trigger: "abscessoodontogenico"
