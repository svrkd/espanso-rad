  - trigger: "usabdtotal"
    label: Abdome total — normal
    replace: |-
      ULTRASSONOGRAFIA DE ABDOME TOTAL

      Técnica:
      Exame ultrassonográfico realizado utilizando sonda convexa multifrequencial, dirigido para região abdominal, que evidenciou:

      Descrição:
      Fígado de topografia, dimensões e contornos normais, com ecotextura sólida e homogênea do parênquima.
      Não há evidência de dilatação das vias biliares intra-hepáticas.
      Vesícula biliar de contornos e dimensões normais, paredes normoespessas e sem imagem típica de cálculo.
      Pâncreas e aorta abdominal parcialmente visualizados devido interposição gasosa de alças intestinais, de aspecto habitual nas janelas acústicas disponíveis.
      Baço de topografia, dimensões e contornos normais, com ecotextura sólida e homogênea do parênquima.
      Rins de topografia, contornos e dimensões normais.
      Espessura córtico-medular conservada de ambos os rins, com ecotextura normal do parênquima bilateralmente.
      Ausência de dilatações dos sistemas pielocalicilares.
      Não se observam imagens de litíases.
      Bexiga com capacidade e distensibilidade normais, contornos regulares, paredes lisas e normoespessas.

      Conclusão:
      Órgãos e estruturas abdominais examinadas de aspecto ultrassonográfico normal.
    word: true

