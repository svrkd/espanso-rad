    word: true

  - trigger: "hpn"
    label: "Hidrocefalia de pressão normal (suspeita)"
    replace: Dilatação dos ventrículos laterais e do terceiro ventrículo com sinais de transudação ependimária (hidrocefalia supratentorial). Ângulo calosal de 91° (VR 100 - 120°). A hipótese de hidrocefalia de pressão normal pode ser considerada dentre os diagnósticos diferenciais.
    word: true

  - trigger: "hsa1"
    label: "Hemorragia subaracnoide"
