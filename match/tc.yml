  - trigger: "hsd"
    label: "Hematoma subdural agudo à esquerda"
    replace: "Hematoma subdural agudo, com espessura máxima de 0,7 cm, localizado ao longo da convexidade cortical do hemisfério cerebral esquerdo, determinando impressão sobre o parênquima encefálico adjacente. Há desvio contralateral de 0,7 cm das estruturas da linha média."
    word: true

  - trigger: "hsdb"
    label: "Hematomas subdurais agudos bilaterais"
    replace: "Hematomas subdurais agudos, localizados ao longo da convexidade cortical dos hemisférios cerebrais, determinando impressão sobre o parênquima encefálico adjacente, à direita com espessura maxima de 0,8 cm e à esquerda com espessura máxima de 0,6 cm."
    word: true

  - trigger: "hsdc"
    label: "Hematoma subdural crônico reagudizado à esquerda"
    replace: "Hematoma subdural crônico com sinais de reagudização e espessura máxima de 2,3 cm, localizado ao longo da convexidade cortical do hemisfério cerebral esquerdo, determinando significativo efeito de massa com desvio contralateral das estruturas da linha média de 1,3 cm."
    word: true

