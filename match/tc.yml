matches:

  # ==========================================================================
  # CRÂNIO / ENCÉFALO / SNC
  # ==========================================================================

  - trigger: "4vnl"
    label: "Quarto ventrículo normal"
    replace: Quarto ventrículo com morfologia e situação conservadas.
    word: true

  - trigger: "acm"
    label: "artéria cerebral média"
    replace: artéria cerebral média
    word: true

  - trigger: "adv"
    label: "Anomalia do desenvolvimento venoso"
    replace: "Imagem que sugere representar anomalia do desenvolvimento venoso no lobo temporal direito, variante anatômica da drenagem venosa normal."
    word: true

  - trigger: "agenesiacorpocaloso"
    label: "Agenesia do corpo caloso"
    replace: "Agenesia do corpo caloso com os demais achados associados: afastamento e paralelismo dos corpos dos ventrículos laterais, sulcos nas regiões parietais e occipitais orientados na linha mediana perpendicularmente ao que seria o corpo caloso, colpocefalia, bandas de substância branca medialmente aos ventrículos laterais, forames de Monro alongados."
    word: true

  - trigger: "aguadecoco"
    label: "Craniostomia frontal com cateter de derivação"
    replace: "Craniostomia frontal direita, através da qual foi introduzido cateter de derivação cuja extremidade encontra-se na linha inter-hemisférica."
    word: true

  - trigger: "ait"
    label: "Isquemia/AIT no giro pré-central esquerdo"
    replace: "Imagem hipodensa, corticossubcortical, localizada no giro pré-central esquerdo. Área de isquemia? Lesão de outra natureza?"
    word: true

  - trigger: "alarga"
    label: "Alargamento ventricular ipsilateral"
    replace: Há alargamento subsequente do ventrículo lateral ipsilateral.
    word: true

  - trigger: "aneurismaroto"
    label: "Hemorragia subaracnoide extensa (Fisher IV)"
    replace: Extensa hemorragia subaracnoide (Fisher IV) ocupando sulcos corticais e cisternas basais, bem como promovendo inundação do sistema ventricular supra e infratentorial (hemoventrículo) com hidrocefalia. Nota-se maior componente na linha inter-hemisférica, na região da artéria comunicante anterior.
    word: true

  - trigger: "angiomav"
    label: "Angioma venoso (variante anatômica)"
    replace: "Angioma venoso no lobo frontal direito, variante anatômica da drenagem venosa normal."
    word: true

  - trigger: "artbocarm1"
    label: "Artefatos de susceptibilidade magnética (material odontológico, RM)"
    replace: "Material odontológico na cavidade oral, promovendo artefatos de susceptibilidade magnética, prejudicando a aquisição das imagens e limitando a avaliação do parênquima encefálico em parte das sequências adquiridas."
    word: true

  - trigger: "avcd"
    label: "Isquemia/lesão giro pré-central direito"
    replace: "Imagem hipodensa localizada no giro pré-central direito. Área de isquemia? Lesão de outra natureza? A critério clínico, se possível, o estudo dessa região por imagens de ressonância magnética poderá fornecer maiores subsídios diagnósticos."
    word: true

  - trigger: "avcduvidoso"
    label: "AVC isquêmico agudo duvidoso (ACI/ACM esquerda)"
    replace: "Hiperdensidade do segmento C7 da artéria carótida interna/do segmento M1 da artéria cerebral média à esquerda, com discreta redução da densidade da ínsula desse lado. A possibilidade de evento vascular isquêmico agudo pode ser considerada. Os diagnósticos diferenciais devem ser aplicados. A critério clínico, se possível, o estudo dessa região por imagens de ressonância magnética poderá fornecer maiores subsídios diagnósticos."
    word: true

  - trigger: "avch"
    label: "AVC hemorrágico nucleocapsular/talâmico esquerdo"
    replace: |
      Extensa lesão hemorrágica nucleocapsular e talâmica esquerda, medindo 4,4 x 4,2 x 3,1 cm, com inundação do sistema ventricular supra e infratentorial (hemoventrículo). Associa-se significativo efeito de massa com apagamento dos sulcos corticais e cisternas basais adjacentes, bem como desvio contralateral de 1,1 cm das estruturas da linha média.
      Hipodensidade do parênquima encefálico adjacente à lesão acima descrita sugerindo representar, ao menos em parte, edema vasogênico.
    word: true

  - trigger: "avcis"
    label: "AVC isquêmico agudo (território da ACP esquerda)"
    replace: "Hipoatenuação acometendo a substância branca profunda e corticossubcortical occipitotemporal e talâmica esquerda, associado à edema de padrão citotóxico, com consequente apagamentos dos sulcos entre os giros corticais e perda da diferenciação das substâncias branca/cinzenta. A possibilidade de evento vascular isquêmico de início recente no território irrigado pela artéria cerebral posterior esquerda pode ser considerada dentre os diagnósticos diferenciais."
    word: true

  - trigger: "avcpost"
    label: "AVC isquêmico agudo (território da ACP direita)"
    replace: "Lesões hipodensas, localizadas nas regiões occipitotemporal e talâmica à direita, associadas a edema de padrão citotóxico, com consequente apagamento dos sulcos entre os giros corticais e perda da diferenciação das substâncias branca/cinzenta. A possibilidade de evento vascular isquêmico de início recente no território irrigado pela artéria cerebral posterior direita pode ser considerada dentre os diagnósticos diferenciais."
    word: true

  - trigger: "avctrans"
    label: "AVC isquêmico com transformação hemorrágica"
    replace: Acentuação da hipoatenuação corticossubcortical e da substância branca profunda localizada nos lobos frontal e parietal, bem como na ínsula e região nucleocapsular à direita, associado a edema de padrão citotóxico, com consequente apagamento dos sulcos entre os giros corticais e perda da diferenciação das substâncias branca/cinzenta. Agora observa-se maior efeito de massa com desvio contralateral das estruturas da linha média de _ cm. Nota-se ainda, surgimento de pequena área de sangramento em região nucleocapsular direita. O conjunto de achados é sugestivo de evento vascular isquêmico de evolução recente com área de tranformação hemorrágica no território irrigado pela artéria cerebral média direita.
    word: true

  - trigger: "avctrans2"
    label: "Progressão de AVC isquêmico (possível transformação hemorrágica)"
    replace: "Acentuação das lesões hipodensas, corticossubcorticais, localizadas no lobo frontal e na ínsula à direita, com apagamento dos sulcos corticais regionais e agora estendendo-se ao lobo parietal ipsilateral. Notam-se hiperdensidades relativas nos núcleos caudado e lentiforme desse lado, que podem representar áreas de transformação hemorrágica ou de preservação de parênquima em lesão de natureza vascular isquêmica. Os diagnósticos diferenciais devem ser aplicados."
    word: true

  - trigger: "balboa"
    label: "Hematoma frontal/periorbitário esquerdo"
    replace: "Aumento de partes moles extracraniano nas regiões frontal e periorbitária à esquerda, sugerindo hematoma."
    word: true

  - trigger: "calo"
    label: "Imagens hipodensas na calota craniana"
    replace: "Pequenas imagens hipodensas na calota craniana, inespecíficas."
    word: true

  - trigger: "calo1"
    label: "Imagem hipodensa na calota craniana"
    replace: "Pequena imagem hipodensa na calota craniana, em região _, inespecífica."
    word: true

  - trigger: "cdv"
    label: "Cateter de derivação ventricular"
    replace: Cateter de derivação ventricular com extremidade cranial no ventrículo lateral.
    word: true

  - trigger: "cerebd"
    label: "hemisfério cerebelar direito"
    replace: hemisfério cerebelar direito
    word: true

  - trigger: "cerebe"
    label: "hemisfério cerebelar esquerdo"
    replace: hemisfério cerebelar esquerdo
    word: true

  - trigger: "cerebee"
    label: "hemisfério cerebelar direito"
    replace: hemisfério cerebelar direito
    word: true

  - trigger: "cistoaracnoide"
    label: "Cisto aracnoide na fossa média esquerda"
    replace: "Formação cística extra-axial, com densidade idêntica à do líquor, localizada na fossa média esquerda, sugerindo cisto aracnoide, medindo _ cm."
    word: true

  - trigger: "cistoaracnoide2"
    label: "Cisto aracnoide retrocerebelar"
    replace: "Formação cística extra-axial, com densidade idêntica à do líquor, localizada na fossa posterior, retrocerebelar, sugerindo cisto aracnoide, medindo _ cm."
    word: true

  - trigger: "cistoaracnoider"
    label: "Cisto aracnoide retrocerebelar"
    replace: "Formação cística extra-axial, com densidade idêntica à do líquor, localizada na fossa posterior, retrocerebelar, sugerindo cisto aracnoide, medindo _ cm."
    word: true

  - trigger: "cistocoloide"
    label: "Cisto coloide do III ventrículo"
    replace: "Imagem hiperdensa, medindo _ cm, localizada na parede anterior do III ventrículo. A possibilidade de cisto coloide pode ser considerada dentre os diagnósticos diferenciais."
    word: true

  - trigger: "cistoporencefalico"
    label: "Cisto porencefálico"
    replace: Área com coeficiente de atenuação semelhante ao líquor localizada nos lobos parietal e occipital direitos (encefalomalácia / gliose), com comunicação e alargamento subsequente do ventrículo lateral ipsilateral. Admite-se inicialmente a possibilidade de cisto porencefálico. Os diagnósticos diferenciais devem ser aplicados.
    word: true

  - trigger: "cistosdeplexo"
    label: "Cistos de plexo coroide (xantogranulomas)"
    replace: "Cistos de plexo coroide nos átrios dos ventrículos laterais (xantogranulomas), com frequência achado incidental, sem correlação clínica."
    word: true

  - trigger: "citomegalovirosecerebral"
    label: "Sequelas de citomegalovirose congênita"
    replace: Parênquima cerebral difusamente afilado com sulcos rasos e calcificações espessas com predomínio cortical, periventricular e em gânglios da base. Associa-se ventriculomegalia. A possibilidade de lesões relacionadas a processo inflamatório/infeccioso congênito, destacando-se citomegalovirose, pode ser considerada. Os diagnósticos diferenciais devem ser aplicados, em estreita correlação com dados clínicos e laboratoriais.
    word: true

  - trigger: "conflitonv"
    label: "Conflito neurovascular (AICA/nervo acústico-facial)"
    replace: A artéria cerebelar anteroinferior esquerda cruza o feixe acústico-facial ipsilateral.
    word: true

  - trigger: "craniost"
    label: "Craniostomia parietal direita com cateter de derivação"
    replace: "Craniostomia parietal direita, através da qual foi introduzido cateter de derivação com extremidade no lobo frontal esquerdo. Associa-se área de encefalomalácia / gliose adjacente ao trajeto do cateter pelo lobo parietal direito."
    word: true

  - trigger: "craniosto"
    label: "Craniostomia direita com cateter de derivação"
    replace: "Craniostomia à direita através da qual foi introduzido cateter de derivação, cuja extremidade encontra-se na linha inter-hemisférica."
    word: true

  - trigger: "degeax"
    label: "Degeneração axonal do pedúnculo cerebral"
    replace: Redução volumétrica do pedúnculo cerebral esquerdo (degeneração axonal).
    word: true

  - trigger: "doencadefahr"
    label: "Doença de Fahr (calcificações dos núcleos da base)"
    replace: "Calcificações comprometendo de forma bilateral e relativamente simétrica os núcleos da base, tálamos e parte da substância branca subcortical dos lobos frontais e temporais. Admitem-se inicialmente as possibilidades de doença de Fahr, alterações relacionadas a hipoparatireoidismo/pseudo-hipoparatireoidismo e distúrbios relacionados ao metabolismo do cálcio. Outros diagnósticos diferenciais devem ser aplicados, em estreita correlação com dados clínicos e laboratoriais."
    word: true

  - trigger: "edemacerebral"
    label: "Edema cerebral difuso"
    replace: "Redução difusa da densidade do parênquima encefálico com apagamento dos sulcos corticais e cisternas basais e perda da diferenciação entre as substâncias branca e cinzenta, sugerindo edema/alterações isquêmicas."
    word: true

  - trigger: "edemacerebral1"
    label: "Edema cerebral perilesional"
    replace: "Redução difusa da densidade do parênquima encefálico (notadamente do parênquima encefálico adjacente à lesão acima descrita), com apagamento dos sulcos corticais e cisternas basais e perda da diferenciação entre as substâncias branca e cinzenta, sugerindo edema/alterações isquêmicas."
    word: true

  - trigger: "encefalopatiahipoxico"
    label: "Encefalopatia hipóxico-isquêmica"
    replace: Hipodensidade difusa do córtex cerebral e cerebelar, bem como dos núcleos da base de forma relativamente simétrica, com apagamento dos sulcos corticais e cisternas basais. A possibilidade de encefalopatia hipóxico-isquêmica pode ser considerada, diante do contexto clínico.
    word: true

  - trigger: "glio"
    label: "Microangiopatia/gliose"
    replace: "Hipoatenuação da substância branca periventricular e dos centros semiovais, provavelmente relacionada à microangiopatia/gliose."
    word: true

  - trigger: "granu"
    label: "Granulação aracnoide"
    replace: "Granulação aracnoide adjacente ao seio transverso esquerdo (com frequência achado incidental, sem correlação clínica)."
    word: true

  - trigger: "granus"
    label: "Granulações aracnoides"
    replace: "Granulações aracnoides adjacentes aos seios transversos (com frequência achado incidental, sem correlação clínica)."
    word: true

  - trigger: "haloedema"
    label: "Edema perilesional"
    replace: "Hipodensidade do parênquima encefálico adjacente à lesão acima descrita, com apagamento dos sulcos corticais regionais e compressão ventricular, sugerindo representar, ao menos em parte, edema."
    word: true

  - trigger: "hemoventriculohipertensivo"
    label: "Hemorragia intraventricular com hipertensão intracraniana"
    replace: "Aumento volumétrico da hemorragia ventricular, agora com inundação do sistema supra e infratentorial. Há balonização dos ventrículos laterais com transudação ependimária e redução difusa da densidade do parênquima encefálico com apagamento dos sulcos corticais/folias cerebelares e cisternas basais e perda da diferenciação entre as substâncias branca e cinzenta, sugerindo edema/alterações isquêmicas com sinais de hipertensão intracraniana. Nota-se herniação subfalcina e uncal do hemisfério cerebral direito."
    word: true

  - trigger: "herniaparede"
    label: "Hérnia de parede abdominal (sem obstrução)"
    replace: "Hérnia de parede abdominal anterior mediana e paramediana esquerda, com extensão craniocaudal de 20,6 cm e diástase dos músculos reto abdominais de 4,8 cm, através da qual há protrusão de gordura intra-abdominal e alças delgadas sob a tela subcutânea. Não há evidências tomográficas de obstrução ou isquemia de alças contidas no saco herniário."
    word: true

  - trigger: "hidrocefaliahiper"
    label: "Hidrocefalia hipertensiva"
    replace: Dilatação do sistema ventricular supratentorial com sinais de transudação ependimária e apagamento dos sulcos corticais na alta convexidade dos hemisférios cerebrais (hidrocefalia hipertensiva).
    word: true

  - trigger: "hidrohiper"
    label: "Hidrocefalia com sinais hipertensivos"
    replace: Ectasia dos ventrículos laterais com sinais de transudação ependimária e apagamento dos sulcos corticais na alta convexidade dos hemisférios cerebrais (hidrocefalia com sinais hipertensivos).
    word: true

  - trigger: "hipoat"
    label: "Microangiopatia/gliose"
    replace: "Hipoatenuação da substância branca periventricular e dos centros semiovais, provavelmente relacionada à microangiopatia/gliose."
    word: true

  - trigger: "hipoati"
    label: "Microangiopatia/gliose"
    replace: "Hipoatenuação da substância branca periventricular e dos centros semiovais, provavelmente relacionada à microangiopatia/gliose."
    word: true

  - trigger: "hipogli"
    label: "Microangiopatia/gliose"
