matches:

  # ==========================================================================
  # CRÂNIO / ENCÉFALO / SNC
  # ==========================================================================

  - trigger: "selaturcica"
    label: "Sela túrcica — normal"
    replace: |
      SELA TÚRCICA

      Clinoides anterior, posterior, dorso selar e assoalho da sela túrcica de morfologia normais.
      Ausência de imagens radiológicas sugestivas de calcificações patológicas.

      OPINIÃO:
      Sela Túrcica radiologicamente normal.
    word: true

  # ==========================================================================
  # FACE / ÓRBITAS / SEIOS DA FACE / PESCOÇO / ATM
  # ==========================================================================

  - trigger: "albright"
    label: "Encurtamento do 4º metacarpo (Albright)"
    replace: "Encurtamento bilateral do 4º metacarpo, achado que pode ser encontrado em síndromes genéticas como pseudohipoparatireoidismo tipo Ia (osteodistrofia hereditária de Albright), entre outras causas congênitas. Correlacionar com dados clínicos."
    word: true

  - trigger: "dsn1"
    label: "Desvio de septo nasal à direita"
    replace: Desvio do septo nasal para a direita.
    word: true

  - trigger: "dsn2"
    label: "Desvio de septo nasal à esquerda"
    replace: Desvio do septo nasal para a esquerda.
    word: true

  - trigger: "redus"
    label: "Espessamento mucoso dos seios etmoidais"
    replace: "Redução da transparência aérea dos seios etmoidais, podendo representar espessamento mucoso."
    word: true

  - trigger: "rxatm"
    label: "Radiografia de ATM"
    replace: |
      Cavidades articulares de contornos regulares.
      Côndilos mandibulares de morfologia preservada.
      Excursão simétrica e adequada dos côndilos à abertura bucal.
      Excursão assimétrica dos côndilos à abertura bucal, menor à (direita/esquerda).
      Excursão reduzida dos côndilos mandibulares.
    word: true

