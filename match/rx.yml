  - trigger: "rxpancol2"
    label: "Estudo panorâmico da coluna vertebral — template completo"
    replace: |
      ESTUDO RADIOGRÁFICO PANORÂMICO DA COLUNA VERTEBRAL

      Textura óssea preservada.
      Não há desvios significativos da coluna vertebral.
      Equilíbrio sagital neutro.
      Corpos vertebrais com altura e alinhamento posterior preservados.
      - Redução da textura óssea.
      - Discreta escoliose dextro-convexa da coluna lombar.
      - Escoliose sigmoidea da coluna vertebral, com desvio para a direita do segmento torácico e para a esquerda do segmento lombar associado a rotação axial dos corpos vertebrais.
      - Retificação da curvatura anteroposterior fisiológica cervical.
      - Acentuação da cifose torácica.
      - Acentuação da lordose lombar.
      - Equilíbrio sagital positivo negativo.
      - Ângulo de Cobb de 24,5º. Consideramos o platô superior de T4, platô inferior de T12 e vertebral apical T9.
      - Alterações degenerativas da coluna vertebral.
      - Redução em cerca de 50% da altura do corpo vertebral de L1.
      - Corpos vertebrais alinhamento posterior preservados.
    word: true

