  # substituído por "doencadefahr" em tc.yml

  - trigger: "doençadefahr"
    label: "Calcificações dos núcleos da base (doença de Fahr)"
    replace: "Calcificações comprometendo de forma bilateral e relativamente simétrica os núcleos da base, tálamos e parte da substância branca subcortical dos lobos frontais e temporais. Admitem-se inicialmente as possibilidades de doença de Fahr, alterações relacionadas a hipoparatireoidismo/pseudo-hipoparatireoidismo e distúrbios relacionados ao metabolismo do cálcio. Outros diagnósticos diferenciais devem ser aplicados, em estreita correlação com dados clínicos e laboratoriais."
    word: true

  # substituído por "fraturaluxacaoombro" em tc.yml

  - trigger: "fraturaluxaçãoombro"
    label: "TC de ombro — fratura-luxação com lesão de Bankart"
    replace: |
      TOMOGRAFIA COMPUTADORIZADA DO OMBRO ESQUERDO S/C
      Técnica:
      Foram obtidas imagens por aquisição volumétrica multislice, sem a administração endovenosa de contraste, com reformatações multiplanares.
      Análise:
      Fratura cominutiva da cabeça e do tubérculo maior do úmero com diástase dos principais fragmentos ósseos. Associa-se luxação anterior e inferior da cabeça do úmero.
      Fratura da porção anteroinferior da glenoide (lesão de Bankart).
      Derrame articular glenoumeral com conteúdo hemático.
      Aumento de volume e densificação de planos mioadiposos adjacentes aos sítios de fratura sugerindo edema/hematoma.
      Aumento do espaço articular acromioclavicular sugerindo lesão/luxação.
      Tendões e ligamentos de avaliação limitada nesse estudo.
      Conclusão:
      Fratura cominutiva da cabeça e do tubérculo maior do úmero com diástase dos principais fragmentos ósseos. Associa-se luxação anterior e inferior da cabeça do úmero.
      Fratura da porção anteroinferior da glenoide (lesão de Bankart).
      Derrame articular glenoumeral com conteúdo hemático.
      Aumento de volume e densificação de planos mioadiposos adjacentes aos sítios de fratura sugerindo edema/hematoma.
      Aumento do espaço articular acromioclavicular sugerindo lesão/luxação.
      Nota:
      Enfisema centrolobular e parasseptal no campo pulmonar esquerdo.
      Opacidades com atenuação em "vidro fosco" esparsas pelo campo pulmonar esquerdo. Esse conjunto de achados, diante do contexto, sugere a possibilidade de contusões pulmonares. Correlacionar com dados clínicos.
    word: true

  # substituído por "hemangiomapequenofigado" em tc.yml

  - trigger: "hemangiomapequenofígado"
    label: "Pequeno hemangioma hepático"
    replace: "Fígado com dimensões, contornos e densidade normais, exceto por imagem nodular hipodensa no segmento VI, medindo 1,1 cm, apresentando homogeneização tardia após a administração do meio de contraste endovenoso, inespecífico, porém sugestivo de hemangioma. Os diagnósticos diferenciais devem ser aplicados."
    word: true

  # substituído por "luxacaocolunacervical" em tc.yml

  - trigger: "luxaçaocolunacervical"
    label: "Subluxação anterior da coluna cervical (C5-C6)"
    replace: "Subluxação anterior da coluna cervical caracterizada por anterolistese grau I de C5 sobre C6, deslocamento facetário bilateral, distância interespinhosa local aumentada, redução do respectivo espaço intervertebral e cifotização cervical. A possibilidade de lesão do complexo ligamentar posterior da coluna cervical por entorse com hiperflexão pode ser considerada. Os diagnósticos diferenciais devem ser aplicados. A critério clínico, se possível, o estudo dessa região por imagens de ressonância magnética poderá fornecer maiores subsídios diagnósticos, inclusive na pesquisa de possível lesão na medula espinhal associada."
    word: true

  # substituído por "luxacaoombro" em tc.yml

  - trigger: "luxaçãoombro"
    label: "TC de ombro — luxação com lesão de Hill-Sachs/Bankart"
    replace: |
      TOMOGRAFIA COMPUTADORIZADA DO OMBRO DIREITO S/C
      Técnica:
      Foram obtidas imagens por aquisição volumétrica multislice, sem a administração endovenosa de contraste, com reformatações multiplanares.

      Análise:
      Irregularidade cortical no aspecto posterolateral no topo da cabeça umeral, sugerindo fratura compressiva de Hill-Sachs.
      Fratura no aspecto anteroinferior do lábio glenoidal compatível com lesão de Bankart.
      Demais estruturas ósseas de forma conservada, sem sinais de fraturas.
      Aumento de volume e densificação de planos mioadiposos adjacentes ao sítio de fratura sugerindo edema/hematoma.
      Mínimo derrame articular glenoumeral.
      Articulação acromioclavicular de contornos regulares.
      Tendões e ligamentos de avaliação limitada nesse estudo.

      Conclusão:
      Irregularidade cortical no aspecto posterolateral no topo da cabeça umeral, sugerindo fratura compressiva de Hill-Sachs.
      Fratura no aspecto anteroinferior do lábio glenoidal compatível com lesão de Bankart.
      Demais estruturas ósseas de forma conservada, sem sinais de fraturas.
      Aumento de volume e densificação de planos mioadiposos adjacentes ao sítio de fratura sugerindo edema/hematoma.
      Mínimo derrame articular glenoumeral.
    word: true

  # substituído por "prostao" em tc.yml

  - trigger: "prostão"
    label: "Aumento volumétrico da próstata"
    replace: Aparente aumento volumétrico da próstata.
    word: true

  # substituído por "recidivapescoco" em tc.yml

  - trigger: "recidivapescoço"
    label: "TC de pescoço — recidiva tumoral pós-operatória"
    replace: |
      TOMOGRAFIA COMPUTADORIZADA DO PESCOÇO C/C

      Técnica:
      Imagens obtidas por aquisição volumétrica "multislice" após a administração intravenosa do meio de contraste iodado.
      Avaliação prejudicada por artefatos de movimentação.

      A análise comparativa com o exame realizado em 29/07/2024 evidencia:
      Solução de continuidade de partes moles associadas a coleções hidroaéreas, confluentes, com realce periférico pelo meio de contraste endovenoso, localizadas na base da língua, bem como em planos subcutâneos e mioadiposos na parede anterior da hipofaringe e da laringe, medindo, em conjunto, cerca de 7,5 x 7,2 x 5,2 cm (AP x CC x LL), com volume aproximado de 146,0 cm³. As possibilidades de abscessos, neoplasia abscedada e/ou áreas de radionecrose podem ser consideradas.
      Solução de continuidade do osso hioide.
      Linfonodomegalias cervicais à direita, algumas com centro necrótico, a maior agora na cadeia IIa, medindo 1,9 x 1,5 cm.
      Múltiplas lesões nodulares escavadas esparsas pelos campos pulmonares. A possibilidade de metástases deve ser considerada dentre os diagnósticos diferenciais.

      Permanecendo:
      Status pós pelveglossectomia parcial, esvaziamento cervical e submandibulectomia à direita (05/2024).
      Formação heterogênea, de limites mal definidos, com realce periférico pelo meio de contraste endovenoso, localizada junto aos músculos milo-hióideo, genio-hióideo e digástrico à direita, com obliteração de partes moles adjacentes, de limites pouco definidos. Correlacionar com orolaringoscopia para diferenciação de processo inflamatório/infeccioso ou recidiva tumoral.
      Glândulas parótidas e submandibular esquerda sem alterações.
      Epiglote, pregas ariepiglóticas, bandas ventriculares e cordas vocais apresentando coeficientes de atenuação preservados.
      Tireoide heterogênea, melhor avaliada em estudo dirigido.
      Ateromatose.
      Espondilose cervical.
    word: true

  # substituído por "tcbraco" em tc.yml

  - trigger: "tcbraço"
    label: "TC de braço — normal (com contraste)"
    replace: |
      TOMOGRAFIA COMPUTADORIZADA DO BRAÇO ESQUERDO C/C

      Técnica:
      Foram obtidas imagens por aquisição volumétrica multislice, antes e após a administração endovenosa de contraste, com reformatações multiplanares.

      Análise:
      Estruturas ósseas de forma conservada, sem sinais de fraturas.
      Planos musculares sem alterações tomográficas.
      Após a administração endovenosa do meio de contraste, observou-se opacificação dos vasos arteriais e venosos do membro superior esquerdo.
      Os maiores calibres observados foram:
      - artéria subclávia: 0,50 cm;
      - artéria axilar: 0,49 cm;
      - artéria braquial: 0,50 cm;
      - artéria radial: 0,20 cm;
      - artéria ulnar: 0,19 cm.

      Conclusão:
      Exame dentro dos padrões da normalidade.
    word: true

  # substituído por "tcintussuscepcao" em tc.yml

  - trigger: "tcintussuscepção"
    label: "Sinais de intussuscepção intestinal"
    replace: "Sinais de intussuscepção na região do cólon direito/ileocecal, com espessamento parietal local das alças intestinais e conteúdo com densidade de partes moles, sem determinar distensão de alças à montante. Associam-se densificação do tecido adiposo adjacente, pequena quantidade de líquido na cavidade pélvica e aumento do número de linfonodos mesentéricos e ileocecais. O conjunto de achados sugere suboclusão intestinal por intussuscepção. Os diagnósticos diferenciais devem ser aplicados. Recomenda-se prosseguir a investigação para a pesquisa de possíveis patologias subjacentes, inclusive neoplasia."
    word: true
