    replace: "Com o advento da nova geração de tomógrafos (multislice) houve um aumento na detecção de diminutos nódulos pulmonares. Em pacientes sem neoplasia conhecida, a maioria destes diminutos nódulos constitui achado benigno. Radiology 2003; 226:489-493."
    word: true

  # substituído por "tcbacia" em tc.yml

  - trigger: "TCBACIA"
    label: "TC de bacia — normal (grafia legada maiúscula)"
    replace: |
      TOMOGRAFIA COMPUTADORIZADA DA BACIA S/C


      Técnica:
      Foram obtidas imagens por aquisição volumétrica multislice, sem a administração endovenosa de contraste, com reformatações multiplanares.

      Análise:
      Estruturas ósseas de formato habitual, sem sinais de fraturas.
      Articulações femoroacetabulares de contornos regulares.
      Articulações sacro-ilíacas e sínfise púbica conservadas.
      Não há sinais de derrame articular.
      Planos musculares e tendíneos sem alterações tomográficas.

      Conclusão:
      Exame dentro dos padrões da normalidade.
    word: true

